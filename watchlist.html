<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Watchlist • Shawn anime-watchlist.SAE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="watchlist">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand"><h1>SAE</h1><p>Shawn anime-watchlist</p></div>
      <nav class="side-nav">
        <a href="index.html">Dashboard</a>
        <a href="watchlist.html" class="active">My Watchlist</a>
        <a href="profile.html">Profile</a>
        <a href="community.html">Community</a>
        <a href="shawn-jr.html">Shawn Jr</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div><h2>My Watchlist</h2><p class="muted">Track what you’re watching, completed, or planning</p></div>
        <div class="user-pill">
          <span id="navUserLabel">Guest</span>
          <button id="logoutBtn" class="btn btn-outline small hidden">Logout</button>
          <a href="login.html" id="loginBtn" class="btn btn-outline small">Sign In</a>
        </div>
      </header>

      <section class="section">
        <div class="watchlist-tabs">
          <button class="tab-btn active" data-status="All">All</button>
          <button class="tab-btn" data-status="Watching">Watching</button>
          <button class="tab-btn" data-status="Completed">Completed</button>
          <button class="tab-btn" data-status="On Hold">On Hold</button>
          <button class="tab-btn" data-status="Dropped">Dropped</button>
          <button class="tab-btn" data-status="Plan to Watch">Plan to Watch</button>
        </div>
        <div id="watchlistGrid" class="anime-grid"></div>
      </section>
    </main>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/watchlist.js"></script>
</body>
</html>
