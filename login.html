<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login • Shawn anime-watchlist.SAE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-brand">
        <h1>SAE</h1>
        <p>Shawn anime-watchlist.SAE</p>
      </div>

      <div class="auth-tabs">
        <button id="showLoginBtn" class="btn small">Sign In</button>
        <button id="showRegisterBtn" class="btn btn-outline small">Sign Up</button>
      </div>

      <form id="loginForm" class="auth-form">
        <h2>Welcome back</h2>
        <input type="email" id="loginEmail" placeholder="Email" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="btn full">Sign In</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <h2>Create your account</h2>
        <input type="text" id="registerUsername" placeholder="Username" required />
        <input type="email" id="registerEmail" placeholder="Email" required />
        <input type="password" id="registerPassword" placeholder="Password" required />
        <button type="submit" class="btn full">Create Account</button>
      </form>

      <p id="authMessage" class="muted auth-message"></p>
      <div class="auth-footer"><a href="index.html">← Back to dashboard</a></div>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
